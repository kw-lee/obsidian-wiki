services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: prod
    env_file: .env
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - vault_data:/data/vault
      - config_data:/data/config
      - ./config/ssh:/root/.ssh:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: prod
    environment:
      ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      API_BASE_URL: http://backend:8000
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for HTTPS:
      # - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  db_data:
  vault_data:
  config_data:
